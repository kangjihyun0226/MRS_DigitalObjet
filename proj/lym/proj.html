<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시간 폴더-이영민</title>
    <link rel="stylesheet" href="../../src/style/each.css" />
    <link rel="stylesheet" href="./src/proj.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="./sketch.js" defer></script>
    <script src="../../src/script/overlay.js" defer></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <nav class="folderTabs" id="tabs" aria-label="Hours"></nav>
      </header>

      <main class="panel">
        <section class="hero" aria-label="Main content">
          <div class="hero-text">
            <h1 id="headline">Loading…</h1>
            <p id="subline">—</p>

            <div class="chips" id="chips"></div>

            <div class="progressWrap" aria-label="Until next hour">
              <div class="progressTop">
                <span class="progressLabel" id="progressLabel"
                  >다음 탭까지</span
                >
                <span class="progressValue" id="progressValue">--분</span>
              </div>
              <div
                class="progressBar"
                role="progressbar"
                aria-valuemin="0"
                aria-valuemax="100"
              >
                <div class="progressFill" id="progressFill"></div>
              </div>
            </div>

            <div class="mission">
              <div class="missionTitle">Now</div>
              <div class="missionBody" id="missionBody">—</div>
            </div>
          </div>

          <div class="hero-visual">
            <img id="heroImage" class="hero-image" alt="" />
          </div>
        </section>

        <section class="minuteWrap" aria-label="Minutes">
          <div class="minuteBar" id="minuteBar"></div>
          <div class="metaRow">
            <div class="clock" id="clockText">--:--:--</div>
            <div class="hint" id="modeHint">LIVE</div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
