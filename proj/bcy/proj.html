<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loop Jack-백채이</title>
    <link rel="stylesheet" href="../../src/style/each.css" />
    <link rel="stylesheet" href="./src/proj.css" />
    <script src="https://cdn.jsdelivr.net/npm/p5@2.0.5/lib/p5.js"></script>
    <script src="./sketch.js" defer></script>
    <script src="../../src/script/overlay.js" defer></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <!-- ------------------------------------------------------------------------------ -->
    <div class="bg container">
      <div class="box1">
        <!-- 아니 위치를 -->

        <div id="canvas-container"></div>
      </div>

      <div class="box2">
        <div class="imges1">
          <img src="./assets/img2/press.svg" alt="press the button" />
        </div>

        <!-- 악마 웃음 -->
        <div>
          <input type="button" class="imgesBtn2" id="imgesBtn" />

          <!-- <img id="imgesBtn" src="./source/img2/devil.svg" alt="devil" /> -->

          <audio
            id="devilSound"
            src="./assets/sound/devil.mp3"
            type="audio/mpeg"
          ></audio>
        </div>

        <div>
          <button class="btn primary" id="pushBtn" onclick="play()">
            press
          </button>

          <audio
            class="gameBtnSound"
            id="btnSound"
            src="./assets/sound/gameStart.mp3"
            type="audio/mpeg"
          ></audio>
        </div>
      </div>
    </div>

    <audio
      id="clickDownSound"
      src="./assets/sound/click.mp3"
      preload="auto"
    ></audio>

    <img class="cur" src="./assets/img2/hand2.svg" alt="hand" />
  </body>
</html>
